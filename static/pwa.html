<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Event Planner</title>
    <style>
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: #050608;
        color: #f4f1ea;
        font-family: system-ui, sans-serif;
      }
      main {
        width: min(420px, calc(100vw - 40px));
        text-align: center;
      }
      a {
        display: inline-flex;
        min-height: 44px;
        align-items: center;
        padding: 0 18px;
        border-radius: 8px;
        background: #f4f1ea;
        color: #050608;
        font-weight: 800;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Event Planner</h1>
      <p>Preparando la app instalada...</p>
      <a href="/">Entrar</a>
    </main>
    <script>
      async function resetPwaCache() {
        try {
          if ('serviceWorker' in navigator) {
            const registrations = await navigator.serviceWorker.getRegistrations();
            await Promise.all(registrations.map((registration) => registration.unregister()));
          }
          if ('caches' in window) {
            const keys = await caches.keys();
            await Promise.all(keys.map((key) => caches.delete(key)));
          }
        } catch {}
      }
      resetPwaCache().finally(() => window.setTimeout(() => window.location.replace('/'), 500));
    </script>
  </body>
</html>
